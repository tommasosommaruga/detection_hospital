# Default configuration for the digital pathology assistant.
# Nothing clinical is hardcoded in the code itself; tune the workflow here.

tiling:
  tile_size: 256
  overlap: 0.0
  background_intensity_cutoff: 220
  wsi_full_res: true
  target_mpp: 0.5
  wsi_max_tiles: 5000
  thumbnail_max_side: 2048

triage:
  suspicious_tile_threshold: 0.5
  detection_threshold: 0.30
  min_review_score: 0.15
  case_score_mode: max
  uncertainty_threshold: 0.45
  disagreement_threshold: 0.25
  borderline_margin: 0.08
  priority_bands:
    - {name: URGENT, min_score: 0.85}
    - {name: HIGH, min_score: 0.60}
    - {name: ROUTINE, min_score: 0.0}
  max_review_regions: 10

grading:
  moderate_case_score: 0.55
  high_case_score: 0.80

qc:
  background_intensity_cutoff: 220
  min_tissue_coverage: 0.05
  min_blur_score: 8.0
  min_stain_range: 8.0

report:
  disclaimer: >-
    PATHOLOGY ASSISTANT DRAFT — for pathologist review and sign-off. Not a final diagnosis.
    approval by a qualified pathologist before entering the medical record.

audit:
  store_dir: runs
