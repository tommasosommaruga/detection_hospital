# Config for testing on 96x96 PatchCamelyon tiles (matches training tile size).

tiling:
  tile_size: 96
  overlap: 0.0
  background_intensity_cutoff: 220
  # PCam tiles are already one patch — always score the full 96×96 image.
  force_whole_image: true
  # Full-res WSI tiling (requires OpenSlide). Matches PCam ~10× training MPP.
  wsi_full_res: true
  target_mpp: 0.972
  wsi_max_tiles: 8000
  thumbnail_max_side: 2048

triage:
  # Tile flagged suspicious on heatmap / ROI list.
  suspicious_tile_threshold: 0.5
  # Case called metastasis when case_score >= this (lower = fewer missed cancers).
  detection_threshold: 0.25
  metastasis_threshold: 0.55
  # Scores in [min_review_score, detection_threshold) → borderline, still reviewed.
  min_review_score: 0.15
  # max = best for recall on focal disease; top_k_mean = default for large slides.
  case_score_mode: max
  uncertainty_threshold: 0.45
  disagreement_threshold: 0.25
  borderline_margin: 0.08
  priority_bands:
    - {name: URGENT, min_score: 0.85}
    - {name: HIGH, min_score: 0.60}
    - {name: ROUTINE, min_score: 0.0}
  max_review_regions: 10

grading:
  moderate_case_score: 0.55
  high_case_score: 0.80

qc:
  background_intensity_cutoff: 220
  min_tissue_coverage: 0.05
  min_blur_score: 8.0
  min_stain_range: 8.0

explainability:
  nn_layers: true
  member_index: 0

report:
  disclaimer: >-
    PATHOLOGY ASSISTANT DRAFT — for pathologist review and sign-off. Not a final diagnosis.
    approval by a qualified pathologist before entering the medical record.

audit:
  store_dir: runs
